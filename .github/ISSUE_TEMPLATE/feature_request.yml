name: Feature request
description: Suggest an improvement or new editor capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Screenshots, examples, or related tools.
